name: CI

# The CLI is the seam the whole stack flows through — every push/PR runs the
# subprocess contract tests (figs.test.mjs) before anything can be released.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
      - run: npm test
